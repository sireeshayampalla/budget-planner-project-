<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100" height="100">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.2" />
    </filter>
  </defs>
  <!-- Background Card -->
  <rect x="10" y="10" width="80" height="80" rx="24" fill="url(#logo-grad)" filter="url(#shadow)" />
  <!-- Financial Growth Bars -->
  <rect x="30" y="52" width="8" height="20" rx="2.5" fill="#ffffff" />
  <rect x="46" y="38" width="8" height="34" rx="2.5" fill="#ffffff" fill-opacity="0.85" />
  <rect x="62" y="24" width="8" height="48" rx="2.5" fill="#ffffff" />
  <!-- Trending line connecting bars -->
  <path d="M34 50 L49 37 L65 24" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="65" cy="24" r="5" fill="#ffffff" />
</svg>
